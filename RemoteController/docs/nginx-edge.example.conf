# Example NGINX edge for Remote Controller (employee RC mTLS termination).
# Copy to your edge host and adjust paths, server_name, and certificate filenames.
#
# Prerequisites:
#   - Employee RC client CA: /etc/nginx/certs/employee-rc-ca.pem
#   - Public TLS cert/key for https://rc.customer.example.com
#   - RC container listening on remote-controller:5001 (Docker network) or 127.0.0.1:5001

upstream remote_controller {
    server remote-controller:5001;
    # Bare metal behind same host: server 127.0.0.1:5001;
}

server {
    listen 443 ssl;
    server_name rc.customer.example.com;

    ssl_certificate     /etc/nginx/certs/public-fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/public.key;

    # Require employee RC client certificate (issued by Knovas)
    ssl_client_certificate /etc/nginx/certs/employee-rc-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    location / {
        proxy_pass http://remote_controller;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward employee cert to RC (tabs encode newlines per RC contract)
        proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
    }
}
