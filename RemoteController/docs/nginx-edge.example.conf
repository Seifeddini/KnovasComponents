# Example NGINX edge for Remote Controller (HTTPS termination).
# Copy to your edge host and adjust paths, server_name, and certificate filenames.
#
# Prerequisites:
#   - Public TLS cert/key for https://rc.customer.example.com
#   - RC container listening on remote-controller:5001 (Docker network) or 127.0.0.1:5001
#
# Employee access uses Authorization: Bearer <JWT> only (no client certificate).

upstream remote_controller {
    server remote-controller:5001;
    # Bare metal behind same host: server 127.0.0.1:5001;
}

server {
    listen 443 ssl;
    server_name rc.customer.example.com;

    ssl_certificate     /etc/nginx/certs/public-fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/public.key;

    location / {
        proxy_pass http://remote_controller;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
