# Internal LAN setup: RC only on localhost:5001 (no NGINX edge).
# RC only (no NGINX edge service). Use when HTTPS edge is not configured yet.
# Usage: docker compose -f docker-compose.yml -f docker-compose.internal.yml up -d --build

services:
  remote-controller:
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ../corpus:/data/corpus:ro
    environment:
      RC_SYNC_STATE_PATH: /var/rc-state/.rc-sync-state.json
      # Local corpus listing on 127.0.0.1 — no RC_INSTANCE_TOKEN or employee JWT for GET /discover
      RC_DISCOVER_LOCAL_BYPASS: "true"

  nginx:
    profiles:
      - edge
