# Remote Controller + NGINX edge (employee mTLS termination).
# 1. Copy .env.example to .env and fill required values.
# 2. Place tenant certs under ./certs and documents under ./data (see GETTING_STARTED.md).
# 3. Configure edge TLS paths in docs/hosting/nginx-edge.example.conf (mount as ./nginx/default.conf).
# 4. docker compose up -d --build

services:
  remote-controller:
    build: .
    image: remote-controller:0.1.1
    env_file: .env
    volumes:
      - ./certs:/certs:ro
      - ./data:/data:ro
      - rc-config:/app/config
      - rc-state:/app
    expose:
      - "5001"
    restart: unless-stopped
    networks:
      - rc-internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
    volumes:
      - ./docs/hosting/nginx-edge.example.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/edge:/etc/nginx/certs:ro
    depends_on:
      - remote-controller
    restart: unless-stopped
    networks:
      - rc-internal

networks:
  rc-internal:
    driver: bridge

volumes:
  rc-config:
  rc-state:
